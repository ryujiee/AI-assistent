version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: secretary_postgres
    restart: always
    environment:
      POSTGRES_USER: secretary_user
      POSTGRES_PASSWORD: secretary_password
      POSTGRES_DB: secretary_db
      TZ: America/Sao_Paulo
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  pgadmin:
    image: dpage/pgadmin4
    container_name: secretary_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      TZ: America/Sao_Paulo
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secretary_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://secretary_user:secretary_password@postgres:5432/secretary_db?sslmode=disable
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 8000
      TZ: America/Sao_Paulo
    depends_on:
      - postgres
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

volumes:
  postgres_data:
