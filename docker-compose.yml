version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: secretary_postgres
    restart: always
    environment:
      POSTGRES_USER: secretary_user
      POSTGRES_PASSWORD: secretary_password
      POSTGRES_DB: secretary_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: secretary_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secretary_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://secretary_user:secretary_password@postgres:5432/secretary_db?sslmode=disable
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 8000
    depends_on:
      - postgres

volumes:
  postgres_data:
